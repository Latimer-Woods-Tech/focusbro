name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20.x'
        cache: 'npm'
        cache-dependency-path: api/package-lock.json
    
    - name: Install API dependencies
      run: cd api && npm ci
    
    - name: Generate Audio Assets
      run: node scripts/generate-audio-elevenlabs.js
      env:
        ELEVENLABS_API_KEY: ${{ secrets.ELEVENLABS_API_KEY }}
      continue-on-error: true
    
    - name: Build HTML module
      run: node create-html-module.js
    
    - name: Deploy Frontend Worker to Cloudflare Workers (Production)
      id: deploy-frontend
      run: |
        # Deploy frontend worker from root directory.
        # pipefail + PIPESTATUS are REQUIRED: without them, `wrangler | tee`
        # reports tee's exit code (always 0), so a failed deploy passes as
        # green without deploying. See issue #6 (root cause of Phase 1 lie).
        set -o pipefail
        echo "🚀 Deploying frontend worker..."
        npx wrangler deploy --env production 2>&1 | tee frontend-deploy.log
        FRONTEND_EXIT=${PIPESTATUS[0]}
        echo "📋 Frontend deployment log (wrangler exit ${FRONTEND_EXIT}):"
        cat frontend-deploy.log
        exit $FRONTEND_EXIT
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_API: ${{ secrets.CLOUDFLARE_API }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
    
    # NOTE (#44): the second "Deploy API" step was removed here. It deployed the
    # SAME api/src/index.js a second time as a routeless duplicate worker
    # (focusbro-api-production, api/wrangler.toml — deleted). One worker serves
    # everything: focusbro-production, routes focusbro.net/*.

    - name: Purge Cloudflare Cache
      run: |
        # Determine which API token to use
        API_TOKEN="${CLOUDFLARE_API_TOKEN:-${CLOUDFLARE_API:-${CF_API_TOKEN}}}"
        
        if [ -z "$API_TOKEN" ]; then
          echo "❌ No Cloudflare API token found"
          exit 1
        fi
        
        ZONE_ID="62cd855349c37acba7c11db6fe2025cc"
        echo "🧹 Purging Cloudflare cache for zone: $ZONE_ID"
        
        RESPONSE=$(curl -s -X POST \
          "https://api.cloudflare.com/client/v4/zones/$ZONE_ID/purge_cache" \
          -H "Authorization: Bearer $API_TOKEN" \
          -H "Content-Type: application/json" \
          -d '{"purge_everything":true}')
        
        echo "✅ Cache purge response:"
        echo "$RESPONSE" | jq .
        
        # Check if purge was successful
        SUCCESS=$(echo "$RESPONSE" | jq -r '.success // false')
        if [ "$SUCCESS" == "true" ]; then
          echo "✅ Cache purge completed successfully!"
        else
          ERROR=$(echo "$RESPONSE" | jq -r '.errors[0].message // "Unknown error"')
          echo "⚠️ Cache purge failed: $ERROR"
          exit 1
        fi
      env:
        CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        CLOUDFLARE_API: ${{ secrets.CLOUDFLARE_API }}
        CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      continue-on-error: true
    
    - name: Check deployment secret
      if: failure()
      run: |
        echo "❌ Deployment failed - CLOUDFLARE_API_TOKEN secret is not set"
        echo ""
        echo "📋 To fix this:"
        echo "1. Go to: https://github.com/adrper79-dot/focusbro/settings/secrets/actions"
        echo "2. Verify that a secret named 'CLOUDFLARE_API_TOKEN' exists"
        echo "3. If it doesn't exist, create it:"
        echo "   - Name: CLOUDFLARE_API_TOKEN"
        echo "   - Value: <your Cloudflare API token>"
        echo ""
        echo "4. Get your Cloudflare API token from:"
        echo "   - https://dash.cloudflare.com/profile/api-tokens"
        echo "   - Click 'Create Token' → 'Edit Cloudflare Workers'"
        echo ""
        echo "Current secret names available: (if any would be listed here...)"
        exit 1
    
    - name: Log deployment status
      run: |
        echo "✅ Deployment complete!"
        echo "API deployed to: https://focusbro.net"
        echo "Check https://dash.cloudflare.com for detailed logs"
    
    - name: Verify deployment
      run: |
        echo "⏳ Waiting for deployment and cache purge to propagate..."
        sleep 10
        
        # Check if the updated title is present
        if curl -s https://focusbro.net/ | grep -q "FocusBro — Your Productivity Co-Pilot"; then
          echo "✅ Page updated successfully!"
        else
          echo "⚠️  Page may still be updating. Check manually: https://focusbro.net/"
          echo "Current title:"
          curl -s https://focusbro.net/ | grep -o "<title>.*</title>" || echo "Could not fetch title"
        fi
