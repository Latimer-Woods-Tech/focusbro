purpose: Pattern-based classification for repo documentation.
overrides:
  - pattern: "docs/_generated/**"
    status: generated
    owner: focusbro
    doc_type: diagram
    fidelity: generated
  - pattern: "docs/_governance/**"
    status: active
    owner: focusbro
    doc_type: policy
  - pattern: "docs/archive/**"
    status: archive
    owner: focusbro
    fidelity: historical
  - pattern: "docs/runbooks/**"
    status: active
    owner: focusbro
    doc_type: runbook
  - pattern: "docs/**"
    status: active
    owner: focusbro
  - pattern: "*.md"
    status: active
    owner: focusbro
